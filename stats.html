<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Pro</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  font-size:18px;
  border-bottom:1px solid #334155;
}

section{
  padding:20px;
}

h2{
  margin:0 0 10px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
}

.value{
  font-size:18px;
  font-weight:bold;
  margin-top:5px;
}

.green{color:var(--green);}
.red{color:var(--red);}
</style>
</head>

<body>

<header>📊 Stats Business (Live Firebase)</header>

<div id="app"></div>

<script type="module">

import { db, collection, getDocs } from "js/firebase.js";

/* ================================
   HELPERS
================================ */
const now = new Date();

const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const startOfWeek = d => {
  const date = new Date(d);
  const day = date.getDay() || 7;
  if (day !== 1) date.setDate(date.getDate() - (day - 1));
  return startOfDay(date);
};
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const startOfYear = d => new Date(d.getFullYear(), 0, 1);

const toDate = t => t?.toDate ? t.toDate() : new Date(t);

function money(v){ return (v||0).toFixed(2)+" FC"; }

/* ================================
   FETCH FIREBASE
================================ */
async function getAll(col){
  const snap = await getDocs(collection(db,col));
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function fetchData(){
  const [sales, sale_items, expenses, debts] = await Promise.all([
    getAll("sales"),
    getAll("sale_items"),
    getAll("expenses"),
    getAll("debts")
  ]);

  return { sales, sale_items, expenses, debts };
}

/* ================================
   FILTER
================================ */
function filter(data,start,end){
  return data.filter(d=>{
    const date = toDate(d.createdAt);
    return date >= start && date <= end;
  });
}

/* ================================
   CALCUL
================================ */
function compute({sales, sale_items, expenses, debts}){

  const total_sales = sales.reduce((a,s)=>a+(s.total_amount||0),0);
  const total_profit = sales.reduce((a,s)=>a+(s.total_profit||0),0);
  const total_expenses = expenses.reduce((a,e)=>a+(e.amount||0),0);
  const debts_remaining = debts.reduce((a,d)=>a+(d.amount_remaining||0),0);

  const nb_sales = sales.length;
  const products_sold = sale_items.reduce((a,i)=>a+(i.quantity||0),0);

  return {
    total_sales,
    total_profit,
    total_expenses,
    debts_remaining,
    real_cash: total_sales - debts_remaining,
    net: total_profit - total_expenses,
    nb_sales,
    products_sold,
    panier: nb_sales ? total_sales/nb_sales : 0
  };
}

/* ================================
   UI
================================ */
function card(t,v,c=""){
  return `
    <div class="card">
      <div>${t}</div>
      <div class="value ${c}">${v}</div>
    </div>
  `;
}

function renderBlock(title,stats){
  return `
    <section>
      <h2>${title}</h2>
      <div class="grid">
        ${card("Ventes", money(stats.total_sales))}
        ${card("Profit", money(stats.total_profit),"green")}
        ${card("Dépenses", money(stats.total_expenses),"red")}
        ${card("Dettes", money(stats.debts_remaining),"red")}
        ${card("Cash réel", money(stats.real_cash))}
        ${card("Net", money(stats.net), stats.net>=0?"green":"red")}
        ${card("Nb ventes", stats.nb_sales)}
        ${card("Produits", stats.products_sold)}
        ${card("Panier", money(stats.panier))}
      </div>
    </section>
  `;
}

/* ================================
   INIT
================================ */
async function init(){

  const data = await fetchData();

  const today = compute({
    sales: filter(data.sales,startOfDay(now),now),
    sale_items: filter(data.sale_items,startOfDay(now),now),
    expenses: filter(data.expenses,startOfDay(now),now),
    debts: filter(data.debts,startOfDay(now),now)
  });

  const week = compute({
    sales: filter(data.sales,startOfWeek(now),now),
    sale_items: filter(data.sale_items,startOfWeek(now),now),
    expenses: filter(data.expenses,startOfWeek(now),now),
    debts: filter(data.debts,startOfWeek(now),now)
  });

  const month = compute({
    sales: filter(data.sales,startOfMonth(now),now),
    sale_items: filter(data.sale_items,startOfMonth(now),now),
    expenses: filter(data.expenses,startOfMonth(now),now),
    debts: filter(data.debts,startOfMonth(now),now)
  });

  const year = compute({
    sales: filter(data.sales,startOfYear(now),now),
    sale_items: filter(data.sale_items,startOfYear(now),now),
    expenses: filter(data.expenses,startOfYear(now),now),
    debts: filter(data.debts,startOfYear(now),now)
  });

  document.getElementById("app").innerHTML =
    renderBlock("Aujourd’hui",today) +
    renderBlock("Semaine",week) +
    renderBlock("Mois",month) +
    renderBlock("Année",year);
}

init();

</script>

</body>
  </html>
