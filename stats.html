<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Pro</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  font-size:18px;
  border-bottom:1px solid #334155;
}

section{
  padding:20px;
}

h2{
  margin:0 0 10px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
}

.value{
  font-size:18px;
  font-weight:bold;
  margin-top:5px;
}

.green{color:var(--green);}
.red{color:var(--red);}
</style>
</head>

<body>

<header>📊 Stats Business (Live Firebase)</header>
<div id="app">Chargement...</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, collection, getDocs 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { 
  getAuth, signInAnonymously 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD8_86DgCqPdwVNy1ww6PPz0TM5lVMWm_s",
  authDomain: "es-shop-db.firebaseapp.com",
  projectId: "es-shop-db",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 AUTH OBLIGATOIRE */
const auth = getAuth(app);
await signInAnonymously(auth);


/* ================================
   HELPERS ROBUSTES
================================ */

const now = new Date();

const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const startOfWeek = d => {
  const date = new Date(d);
  const day = date.getDay() || 7;
  if (day !== 1) date.setDate(date.getDate() - (day - 1));
  return startOfDay(date);
};
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const startOfYear = d => new Date(d.getFullYear(), 0, 1);

// 🔥 ULTRA SAFE
function toDate(t){
  if (!t) return null;

  if (t.seconds) return new Date(t.seconds * 1000); // Firestore brut
  if (t.toDate) return t.toDate();

  const d = new Date(t);
  return isNaN(d) ? null : d;
}

const money = v => (v || 0).toFixed(2) + " FC";

/* ================================
   FETCH DIRECT
================================ */

async function getAll(col){
  const snap = await getDocs(collection(db,col));
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

/* ================================
   FILTER FIX (IMPORTANT)
================================ */

function filter(data,start,end){
  return data.filter(d=>{
    const date = toDate(d.createdAt);

    // 🔥 SI PAS DE DATE → ON GARDE (important pour ta DB actuelle)
    if (!date) return true;

    return date >= start && date <= end;
  });
}

/* ================================
   CALCUL
================================ */

function compute({sales, sale_items, expenses, debts}){

  const total_sales = sales.reduce((a,s)=>a+(s.total_amount||0),0);
  const total_profit = sales.reduce((a,s)=>a+(s.total_profit||0),0);
  const total_expenses = expenses.reduce((a,e)=>a+(e.amount||0),0);
  const debts_remaining = debts.reduce((a,d)=>a+(d.amount_remaining||0),0);

  return {
    total_sales,
    total_profit,
    total_expenses,
    debts_remaining,
    real_cash: total_sales - debts_remaining,
    net: total_profit - total_expenses,
    nb_sales: sales.length,
    products_sold: sale_items.reduce((a,i)=>a+(i.quantity||0),0),
    panier: sales.length ? total_sales / sales.length : 0
  };
}

/* ================================
   UI
================================ */

function card(t,v,c=""){
  return `
    <div class="card">
      <div>${t}</div>
      <div class="value ${c}">${v}</div>
    </div>
  `;
}

function block(title,s){
  return `
    <section>
      <h2>${title}</h2>
      <div class="grid">
        ${card("Ventes", money(s.total_sales))}
        ${card("Profit", money(s.total_profit),"green")}
        ${card("Dépenses", money(s.total_expenses),"red")}
        ${card("Dettes", money(s.debts_remaining),"red")}
        ${card("Cash réel", money(s.real_cash))}
        ${card("Net", money(s.net), s.net>=0?"green":"red")}
        ${card("Nb ventes", s.nb_sales)}
        ${card("Produits", s.products_sold)}
        ${card("Panier", money(s.panier))}
      </div>
    </section>
  `;
}

/* ================================
   INIT
================================ */

async function init(){

  try {

    const sales = await getAll("sales");
    const sale_items = await getAll("sale_items");
    const expenses = await getAll("expenses");
    const debts = await getAll("debts");

    const today = compute({
      sales: filter(sales,startOfDay(now),now),
      sale_items,
      expenses: filter(expenses,startOfDay(now),now),
      debts: filter(debts,startOfDay(now),now)
    });

    const week = compute({
      sales: filter(sales,startOfWeek(now),now),
      sale_items,
      expenses: filter(expenses,startOfWeek(now),now),
      debts: filter(debts,startOfWeek(now),now)
    });

    const month = compute({
      sales: filter(sales,startOfMonth(now),now),
      sale_items,
      expenses: filter(expenses,startOfMonth(now),now),
      debts: filter(debts,startOfMonth(now),now)
    });

    const year = compute({
      sales: filter(sales,startOfYear(now),now),
      sale_items,
      expenses: filter(expenses,startOfYear(now),now),
      debts: filter(debts,startOfYear(now),now)
    });

    document.getElementById("app").innerHTML =
      block("Aujourd’hui",today) +
      block("Semaine",week) +
      block("Mois",month) +
      block("Année",year);

  } catch(e) {

    document.getElementById("app").innerHTML = `
      <div style="color:red;padding:20px;">
        ❌ ${e.message}
      </div>
    `;
  }
}

init();

</script>

</body>
</html>
