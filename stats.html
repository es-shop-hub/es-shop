<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Pro</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --text:#e2e8f0;
  --muted:#94a3b8;
  --green:#22c55e;
  --red:#ef4444;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  font-size:18px;
  border-bottom:1px solid #334155;
}

section{
  padding:20px;
}

h2{
  margin:0 0 10px;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:10px;
}

.value{
  font-size:18px;
  font-weight:bold;
  margin-top:5px;
}

.green{color:var(--green);}
.red{color:var(--red);}
</style>
</head>

<body>

<header>📊 Stats Business (Live Firebase)</header>
<div id="app">Chargement...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* ================================
   FIREBASE INIT
================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD8_86DgCqPdwVNy1ww6PPz0TM5lVMWm_s",
  authDomain: "es-shop-db.firebaseapp.com",
  projectId: "es-shop-db",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================================
   HELPERS
================================ */
const now = new Date();

const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
const startOfWeek = d => {
  const date = new Date(d);
  const day = date.getDay() || 7;
  if (day !== 1) date.setDate(date.getDate() - (day - 1));
  return startOfDay(date);
};
const startOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const startOfYear = d => new Date(d.getFullYear(), 0, 1);

const toDate = t => {
  if (!t) return null;
  if (t.toDate) return t.toDate();
  const d = new Date(t);
  return isNaN(d) ? null : d;
};

const money = v => (v||0).toFixed(2)+" FC";

/* ================================
   FETCH
================================ */
async function getAll(col){
  const snap = await getDocs(collection(db,col));
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

/* ================================
   FILTER SAFE (ANTI ZERO BUG)
================================ */
function safeFilter(data,start,end){
  const filtered = data.filter(d=>{
    const date = toDate(d.createdAt);
    return date && date >= start && date <= end;
  });

  // 🔥 SI RIEN → on retourne tout (fallback demo)
  return filtered.length ? filtered : data;
}

/* ================================
   CALCUL
================================ */
function compute({sales, sale_items, expenses, debts}){

  const total_sales = sales.reduce((a,s)=>a+(s.total_amount||0),0);
  const total_profit = sales.reduce((a,s)=>a+(s.total_profit||0),0);
  const total_expenses = expenses.reduce((a,e)=>a+(e.amount||0),0);
  const debts_remaining = debts.reduce((a,d)=>a+(d.amount_remaining||0),0);

  const nb_sales = sales.length;
  const products_sold = sale_items.reduce((a,i)=>a+(i.quantity||0),0);

  return {
    total_sales,
    total_profit,
    total_expenses,
    debts_remaining,
    real_cash: total_sales - debts_remaining,
    net: total_profit - total_expenses,
    nb_sales,
    products_sold,
    panier: nb_sales ? total_sales/nb_sales : 0
  };
}

/* ================================
   UI
================================ */
function card(t,v,c=""){
  return `
    <div class="card">
      <div>${t}</div>
      <div class="value ${c}">${v}</div>
    </div>
  `;
}

function block(title,s){
  return `
    <section>
      <h2>${title}</h2>
      <div class="grid">
        ${card("Ventes", money(s.total_sales))}
        ${card("Profit", money(s.total_profit),"green")}
        ${card("Dépenses", money(s.total_expenses),"red")}
        ${card("Dettes", money(s.debts_remaining),"red")}
        ${card("Cash réel", money(s.real_cash))}
        ${card("Net", money(s.net), s.net>=0?"green":"red")}
        ${card("Nb ventes", s.nb_sales)}
        ${card("Produits", s.products_sold)}
        ${card("Panier", money(s.panier))}
      </div>
    </section>
  `;
}

/* ================================
   INIT
================================ */
async function init(){

  const [sales, sale_items, expenses, debts] = await Promise.all([
    getAll("sales"),
    getAll("sale_items"),
    getAll("expenses"),
    getAll("debts")
  ]);

  const today = compute({
    sales: safeFilter(sales,startOfDay(now),now),
    sale_items,
    expenses: safeFilter(expenses,startOfDay(now),now),
    debts: safeFilter(debts,startOfDay(now),now)
  });

  const week = compute({
    sales: safeFilter(sales,startOfWeek(now),now),
    sale_items,
    expenses: safeFilter(expenses,startOfWeek(now),now),
    debts: safeFilter(debts,startOfWeek(now),now)
  });

  const month = compute({
    sales: safeFilter(sales,startOfMonth(now),now),
    sale_items,
    expenses: safeFilter(expenses,startOfMonth(now),now),
    debts: safeFilter(debts,startOfMonth(now),now)
  });

  const year = compute({
    sales: safeFilter(sales,startOfYear(now),now),
    sale_items,
    expenses: safeFilter(expenses,startOfYear(now),now),
    debts: safeFilter(debts,startOfYear(now),now)
  });

  document.getElementById("app").innerHTML =
    block("Aujourd’hui",today) +
    block("Semaine",week) +
    block("Mois",month) +
    block("Année",year);
}

init();

</script>

</body>
</html>
