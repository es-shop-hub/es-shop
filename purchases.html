<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achats fournisseurs</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* NAVIGATION BOTTOM FIXE */
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      color: white;
      z-index: 1000;
    }
    nav div {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    nav div:hover,
    nav div.active {
      color: #D4AF37;
      font-weight: bold;
    }

    /* PAGE STYLE */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 70px; /* espace nav bottom */
      background: #f5f6fa;
    }
    h2 {
      text-align: center;
      margin-top: 20px;
      color: #2f3640;
    }
    form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    form label {
      font-weight: bold;
    }
    form input, form select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    form button {
      padding: 10px;
      background: #192a56;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    form button:hover {
      background: #40739e;
    }

    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    table th, table td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    table th {
      background: #192a56;
      color: white;
    }
    table button {
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #40739e;
      color: white;
      transition: 0.2s;
    }
    table button:hover {
      background: #2f3640;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-item" data-page="index.html">🛒 Vente rapide</div>
    <div class="nav-item" data-page="products.html">📦 Produits</div>
    <div class="nav-item" data-page="stats.html">📊 Stats</div>
    <div class="nav-item" data-page="settings.html">⚙️ Paramètres</div>
    <div class="nav-item active" data-page="purchases.html">📥 Achats</div>
    <div class="nav-item" data-page="losses.html">❌ Pertes</div>
  </nav>

  <h2>Ajouter une commande fournisseur</h2>

  <form id="purchaseForm">
    <label for="supplierName">Fournisseur :</label>
    <input type="text" id="supplierName" placeholder="Nom du fournisseur" required>

    <label for="productSelect">Produit :</label>
    <select id="productSelect" required>
      <option value="">-- Sélectionnez un produit existant ou tapez un nouveau --</option>
    </select>

    <input type="text" id="productName" placeholder="Nouveau produit (si non listé)" style="display:none;">

    <label for="quantity">Quantité :</label>
    <input type="number" id="quantity" min="1" required>

    <label for="unitPrice">Prix unitaire :</label>
    <input type="number" id="unitPrice" min="0.01" step="0.01" required>

    <button type="submit">Ajouter commande</button>
  </form>

  <h2>Stock actuel</h2>
  <table id="stockTable">
    <thead>
      <tr>
        <th>Produit</th>
        <th>Quantité</th>
        <th>Prix unitaire</th>
        <th>Total</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module" src="js/purchases.js"></script>

  <script>
    // NAVIGATION
    document.querySelectorAll('nav .nav-item').forEach(item => {
      if (item.dataset.page === location.pathname.split('/').pop()) {
        item.classList.add('active');
      }
      item.addEventListener('click', () => location.href = item.dataset.page);
    });

    // SWITCH entre produit existant / nouveau produit
    const productSelect = document.getElementById('productSelect');
    const productNameInput = document.getElementById('productName');

    productSelect.addEventListener('change', () => {
      if (productSelect.value === "new") {
        productNameInput.style.display = "block";
        productNameInput.value = "";
      } else {
        productNameInput.style.display = "none";
        productNameInput.value = productSelect.value;
      }
    });

    // --- LOAD PRODUITS EXISTANTS depuis Firebase ---
    import { db, collection, getDocs } from './firebase.js';
    const productsCol = collection(db, 'products');

    async function loadProductOptions() {
      const snap = await getDocs(productsCol);
      snap.forEach(docSnap => {
        const p = docSnap.data();
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name;
        productSelect.appendChild(opt);
      });
      const newOpt = document.createElement('option');
      newOpt.value = "new";
      newOpt.textContent = "Ajouter nouveau produit";
      productSelect.appendChild(newOpt);
    }

    loadProductOptions();
  </script>

</body>
</html>
