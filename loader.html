<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-Shop Stats</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
  padding:20px;
}

h2{margin-bottom:10px;}

/* MODE SWITCH */
.mode{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.mode button{
  padding:10px 15px;
  border-radius:6px;
  border:1px solid #ddd;
  cursor:pointer;
  background:white;
}

.mode button.active{
  background:#0B5FFF;
  color:white;
  border:none;
}

/* FILTERS */
.filters{
  margin-bottom:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input,button{
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  background:#0B5FFF;
  color:white;
  border:none;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.big{
  font-size:22px;
  font-weight:bold;
}

small{color:#666}
</style>
</head>

<body>

<h2>📊 Es-Shop Business Overview</h2>

<!-- MODE SWITCH -->
<div class="mode">
  <button id="modeGlobal" class="active">📊 Global</button>
  <button id="modeFilter">📅 Filtre</button>
</div>

<!-- FILTERS -->
<div class="filters" id="filtersBox">
  <input type="date" id="start">
  <input type="date" id="end">
  <button id="apply">Appliquer</button>
</div>

<!-- DASHBOARD -->
<div class="grid">
  <div class="card">
    <small>💰 Chiffre d'affaires</small>
    <div class="big" id="sales">0</div>
  </div>

  <div class="card">
    <small>📈 Profit net</small>
    <div class="big" id="profit">0</div>
  </div>

  <div class="card">
    <small>💸 Dépenses</small>
    <div class="big" id="expenses">0</div>
  </div>

  <div class="card">
    <small>📦 Produits vendus</small>
    <div class="big" id="sold">0</div>
  </div>

  <div class="card">
    <small>📉 Stock OUT</small>
    <div class="big" id="out">0</div>
  </div>

  <div class="card">
    <small>📥 Stock IN</small>
    <div class="big" id="in">0</div>
  </div>
</div>

<script type="module">
import { db } from "./js/firebase.js";
import {
  collection, getDocs, query
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const auth = getAuth();

/* ================= STATE ================= */
let mode = "global";

let data = {
  sales: [],
  expenses: [],
  stock: []
};

/* ================= HELPERS ================= */
const el = (id) => document.getElementById(id);

const n = (v) => isNaN(Number(v)) ? 0 : Number(v);

function toDate(t){
  if (!t) return null;
  if (typeof t.toDate === "function") return t.toDate();
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="login.html";
  await load();
  render();
});

/* ================= LOAD ================= */
async function load(){
  const [salesSnap, expSnap, stockSnap] = await Promise.all([
    getDocs(collection(db,"sales")),
    getDocs(collection(db,"expenses")),
    getDocs(collection(db,"stock_movements"))
  ]);

  data.sales = salesSnap.docs.map(d => d.data() || {});
  data.expenses = expSnap.docs.map(d => d.data() || {});
  data.stock = stockSnap.docs.map(d => d.data() || {});
}

/* ================= FILTER ================= */
function filterByDate(list){
  if(mode === "global") return list;

  const start = el("start")?.value;
  const end = el("end")?.value;

  if(!start && !end) return list;

  const startDate = start ? new Date(start) : null;
  const endDate = end ? new Date(end) : null;

  return list.filter(item=>{
    const d = toDate(item.createdAt);
    if(!d) return false;

    if(startDate && d < startDate) return false;
    if(endDate && d > endDate) return false;

    return true;
  });
}

/* ================= RENDER ================= */
function render(){

  const sales = filterByDate(data.sales);
  const expenses = filterByDate(data.expenses);
  const stock = filterByDate(data.stock);

  const totalSales = sales.reduce((a,s)=>a+n(s.total_amount),0);
  const profit = sales.reduce((a,s)=>a+n(s.total_profit),0);
  const exp = expenses.reduce((a,e)=>a+n(e.amount),0);

  const inStock = stock.filter(s=>s.type==="IN").reduce((a,s)=>a+n(s.quantity),0);
  const outStock = stock.filter(s=>s.type==="OUT").reduce((a,s)=>a+n(s.quantity),0);

  el("sales").textContent = totalSales+" FC";
  el("profit").textContent = (profit-exp)+" FC";
  el("expenses").textContent = exp+" FC";
  el("sold").textContent = sales.length;
  el("in").textContent = inStock;
  el("out").textContent = outStock;
}

/* ================= EVENTS ================= */
el("modeGlobal").onclick = ()=>{
  mode="global";
  el("modeGlobal").classList.add("active");
  el("modeFilter").classList.remove("active");
  render();
};

el("modeFilter").onclick = ()=>{
  mode="filter";
  el("modeFilter").classList.add("active");
  el("modeGlobal").classList.remove("active");
  render();
};

el("apply").onclick = render;
</script>

</body>
</html>
