<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-Shop Stats</title>

<style>
/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* BODY */
body{
  font-family: Arial, sans-serif;
  background:#f5f7fa;
  padding:20px;
  padding-bottom:80px; /* 🔥 espace pour nav */
  overflow-y:auto;
}

/* TITRE */
h2{
  margin-bottom:15px;
}

/* GRID SCROLLABLE */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* TEXT */
.big{
  font-size:22px;
  font-weight:bold;
}

small{
  color:#666;
}

/* DEBUG */
#debug{
  margin-bottom:10px;
  color:red;
  font-size:13px;
}

/* 🔥 NAV FIXED (NE SCROLL PAS) */
nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:65px;

  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;

  color:white;
  z-index:9999;

  border-top:1px solid rgba(255,255,255,0.1);
}

/* NAV ITEMS */
nav .nav-item{
  flex:1;
  text-align:center;
  font-size:11px;
  cursor:pointer;
}

/* ACTIVE */
nav .nav-item.active{
  color:#D4AF37;
  font-weight:bold;
}

/* 🔥 Empêche tout scroll horizontal */
html, body{
  overflow-x:hidden;
}
</style>
</head>

<body>

<h2>📊 Es-Shop Global Dashboard</h2>
<button id="pdfBtn" style="margin-bottom:15px;padding:10px 15px;border:none;background:#0B5FFF;color:white;border-radius:6px;cursor:pointer;">
  📄 Télécharger PDF
</button>
<div id="debug" style="margin-bottom:10px;color:red;font-size:13px;"></div>
<div class="grid">

    <div class="card">
  <small>📦 Valeur du stock</small>
  <div class="big" id="stockValue">0</div>
</div>

  <div class="card">
    <small>💰 Chiffre d'affaires</small>
    <div class="big" id="sales">0</div>
  </div>
  
  <div class="card">
  <small>💵 Cash Flow</small>
  <div class="big" id="cashFlow">0</div>
</div>

<div class="card">
  <small>🧠 Profit idéal</small>
  <div class="big" id="idealProfit">0</div>
</div>

  <div class="card">
    <small>📈 Profit net</small>
    <div class="big" id="profit">0</div>
  </div>
  
  <div class="card">
  <small>🔁 Taux réinvestissement</small>
  <div class="big" id="reinvestRate">0%</div>
</div>

  <div class="card">
    <small>💸 Dépenses</small>
    <div class="big" id="expenses">0</div>
  </div>

  <div class="card">
    <small>📦 Produits vendus</small>
    <div class="big" id="sold">0</div>
  </div>

  <div class="card">
    <small>📊 Stock total (actuel)</small>
    <div class="big" id="stockTotal">0</div>
  </div>

  <div class="card">
    <small>📦 Nombre de produits</small>
    <div class="big" id="products">0</div>
  </div>

</div>

<nav>
  <div class="nav-item" data-page="index.html">🛒 Vente rapide</div>
  <div class="nav-item" data-page="products.html">📦 Produits</div>
  <div class="nav-item" data-page="stats.html">📊 Stats</div>
  <div class="nav-item" data-page="pages.html">🔗 navigation</div>
  <div class="nav-item active" data-page="loader.html">📥 Loader</div>
  <div class="nav-item" data-page="losses.html">❌ Pertes</div>
</nav>

<script>
document.querySelectorAll('nav .nav-item').forEach(item => {
  item.addEventListener('click', () => location.href = item.dataset.page);
});

</script>

<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { jsPDF } from "https://esm.sh/jspdf@2.5.1";
import html2canvas from "https://esm.sh/html2canvas@1.4.1";

const el = (id) => document.getElementById(id);
const n = (v) => Number(v) || 0;

/* =========================
   DEBUG
========================= */
let debugTimer;

function debug(msg) {
  const box = el("debug");
  if (!box) return;

  box.textContent = msg;

  clearTimeout(debugTimer);
  debugTimer = setTimeout(() => {
    box.textContent = "";
  }, 60000);
}

/* =========================
   STATE
========================= */
let ready = false;

/* =========================
   AUTH
========================= */
const auth = getAuth();

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  debug("🔄 Chargement...");
  await load();
});

/* =========================
   LOAD
========================= */
async function load() {
  try {

    const [salesSnap, expSnap, stockSnap, prodSnap, invSnap] = await Promise.all([
  getDocs(collection(db, "sales")),
  getDocs(collection(db, "expenses")),
  getDocs(collection(db, "stock_movements")),
  getDocs(collection(db, "products")),
  getDocs(collection(db, "investments")) // 🔥 ajouté
]);

const investments = invSnap.docs.map(d => d.data() || {});

    const sales = salesSnap.docs.map(d => d.data() || {});
    const expenses = expSnap.docs.map(d => d.data() || {});
    const stock = stockSnap.docs.map(d => d.data() || {});
    const products = prodSnap.docs.map(d => d.data() || {});

    render(sales, expenses, stock, products, investments);

    ready = true;
    el("pdfBtn").disabled = false;

    debug("✅ Dashboard prêt");

  } catch (e) {
    debug("❌ " + e.message);
  }
}

/* =========================
   RENDER
========================= */
function render(sales, expenses, stock, products, investments) {

    const stockValue = products.reduce((total, p) => {

  const price = n(p.price_buy);       // ✔ coût réel stock
  const stock = n(p.stock_current);   // ✔ stock réel

  return total + (price * stock);

}, 0);

const totalSales = sales.reduce((a, s) =>
  a + n(s.total_amount || s.amount || s.amount_total)
, 0);

const totalExpenses = expenses.reduce((a, e) =>
  a + n(e.amount)
, 0);

// 🔥 réinvestissement réel
const totalReinvested = investments.reduce((a, i) =>
  a + n(i.reinvested)
, 0);

// 🔥 profit net réel
const netProfit = totalSales - totalExpenses - totalReinvested;

// 🔥 cash flow
const cashFlow = totalSales - totalExpenses;

// 🔥 profit idéal (sans dépenses ni reinvest)
const idealProfit = sales.reduce((a, s) =>
  a + n(s.total_profit || s.profit)
, 0);

const reinvestRate = totalSales > 0
  ? (totalReinvested / totalSales) * 100
  : 0;

  const stockIn = stock.filter(s => s.type === "IN")
    .reduce((a, s) => a + n(s.quantity), 0);

  const stockOut = stock.filter(s => s.type === "OUT")
    .reduce((a, s) => a + n(s.quantity), 0);

  const stockTotal = stockIn - stockOut;

  
  el("stockValue").textContent = stockValue + " FC";
  el("sales").textContent = totalSales + " FC";
  el("profit").textContent = netProfit + " FC"; // ✔ vrai profit
  el("expenses").textContent = totalExpenses + " FC";
  el("sold").textContent = sales.length;
  el("stockTotal").textContent = stockTotal;
  el("products").textContent = products.length;
  el("cashFlow").textContent = cashFlow + " FC";
el("idealProfit").textContent = idealProfit + " FC";
el("reinvestRate").textContent = reinvestRate.toFixed(1) + "%";

  debug("✅ OK");
}

/* =========================
   PDF (CLEAN MODULE ONLY)
========================= */
el("pdfBtn").disabled = true;

function generateId() {
  return "dev" + Date.now().toString(36).toUpperCase();
}

function formatDate() {
  return new Date().toLocaleString("fr-FR", {
    dateStyle: "medium",
    timeStyle: "short"
  });
}

el("pdfBtn").addEventListener("click", async () => {

  if (!ready) {
    debug("⏳ Chargement...");
    return;
  }

  try {

    const grid = document.querySelector(".grid");

    // 🔥 SAUVEGARDE styles actuels
    const oldWidth = grid.style.width;
    const oldMaxWidth = grid.style.maxWidth;

    // 🔥 FIX largeur (clé du problème)
    grid.style.width = "800px";
    grid.style.maxWidth = "800px";

    const canvas = await html2canvas(grid, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff"
    });

    // 🔁 RESTORE (aucune casse UI)
    grid.style.width = oldWidth;
    grid.style.maxWidth = oldMaxWidth;

    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p", "mm", "a4");

    const id = generateId();
    const date = formatDate();

    /* HEADER */
    pdf.setFont("helvetica", "bold");
    pdf.setFontSize(16);
    pdf.text("Es-Shop Invoice Report", 14, 18);

    pdf.setFontSize(10);
    pdf.setFont("helvetica", "normal");
    pdf.text(`ID: ${id}`, 14, 26);
    pdf.text(`Date: ${date}`, 14, 32);

    /* LOGO */
    pdf.setDrawColor(200);
    pdf.rect(160, 10, 35, 20);
    pdf.setFontSize(8);
    pdf.text("ES-SHOP", 172, 22);

    /* IMAGE GRID */
    const w = 190;
    const h = (canvas.height * w) / canvas.width;

    pdf.addImage(img, "PNG", 10, 40, w, h);

    /* FOOTER */
    pdf.setFontSize(8);
    pdf.setTextColor(120);
    pdf.text("Generated by Es-Shop System", 14, 285);

    pdf.save(`es-shop-${id}.pdf`);

    debug("📄 PDF généré");

  } catch (e) {
    debug("❌ PDF: " + e.message);
  }

});
</script>

</body>
</html>
