<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-Shop Stats</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
  padding:20px;
}

h2{margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.big{
  font-size:22px;
  font-weight:bold;
}

small{color:#666}

.filters{
  margin-bottom:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input,button{
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  background:#0B5FFF;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Es-Shop Business Overview</h2>

<div class="filters">
  <input type="date" id="start">
  <input type="date" id="end">
  <button id="apply">Filtrer</button>
  <button id="export">Export CSV</button>
</div>

<div class="grid">
  <div class="card">
    <small>💰 Chiffre d'affaires</small>
    <div class="big" id="sales">0</div>
  </div>

  <div class="card">
    <small>📈 Profit net</small>
    <div class="big" id="profit">0</div>
  </div>

  <div class="card">
    <small>💸 Dépenses</small>
    <div class="big" id="expenses">0</div>
  </div>

  <div class="card">
    <small>📦 Produits vendus</small>
    <div class="big" id="sold">0</div>
  </div>

  <div class="card">
    <small>📉 Stock OUT</small>
    <div class="big" id="out">0</div>
  </div>

  <div class="card">
    <small>📥 Stock IN</small>
    <div class="big" id="in">0</div>
  </div>
</div>

<script type="module">
import { db } from "./js/firebase.js";
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const auth = getAuth();

let data = {
  sales: [],
  expenses: [],
  stock: []
};

function toDate(t){
  return t?.toDate ? t.toDate() : new Date(t);
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="login.html";

  await load();
});

/* ================= LOAD ================= */
async function load(){
  const [salesSnap, expSnap, stockSnap] = await Promise.all([
    getDocs(query(collection(db,"sales"), orderBy("createdAt","desc"))),
    getDocs(query(collection(db,"expenses"), orderBy("createdAt","desc"))),
    getDocs(query(collection(db,"stock_movements"), orderBy("createdAt","desc")))
  ]);

  data.sales = salesSnap.docs.map(d=>d.data());
  data.expenses = expSnap.docs.map(d=>d.data());
  data.stock = stockSnap.docs.map(d=>d.data());

  render();
}

/* ================= FILTER ================= */
function filterRange(list, start, end){
  return list.filter(i=>{
    const d = toDate(i.createdAt);
    if(start && d < new Date(start)) return false;
    if(end && d > new Date(end)) return false;
    return true;
  });
}

/* ================= RENDER ================= */
function render(){
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  const sales = filterRange(data.sales,start,end);
  const expenses = filterRange(data.expenses,start,end);
  const stock = filterRange(data.stock,start,end);

  const totalSales = sales.reduce((a,s)=>a+(s.total_amount||0),0);
  const profit = sales.reduce((a,s)=>a+(s.total_profit||0),0);
  const exp = expenses.reduce((a,e)=>a+(e.amount||0),0);

  const inStock = stock.filter(s=>s.type==="IN").reduce((a,s)=>a+(s.quantity||0),0);
  const outStock = stock.filter(s=>s.type==="OUT").reduce((a,s)=>a+(s.quantity||0),0);

  const soldQty = sales.length;

  document.getElementById("sales").textContent = totalSales + " FC";
  document.getElementById("profit").textContent = (profit-exp) + " FC";
  document.getElementById("expenses").textContent = exp + " FC";

  document.getElementById("sold").textContent = soldQty;
  document.getElementById("in").textContent = inStock;
  document.getElementById("out").textContent = outStock;
}

/* ================= EVENTS ================= */
document.getElementById("apply").onclick = render;

document.getElementById("export").onclick = ()=>{
  const csv = [
    "Type,Value",
    `Sales,${document.getElementById("sales").textContent}`,
    `Profit,${document.getElementById("profit").textContent}`,
    `Expenses,${document.getElementById("expenses").textContent}`
  ].join("\n");

  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "es-shop-stats.csv";
  a.click();
};
</script>

</body>
</html>
