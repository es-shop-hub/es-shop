<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-Shop Stats</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
  padding:20px;
}

h2{margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.big{
  font-size:22px;
  font-weight:bold;
}

small{color:#666}
  nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      color: white;
      z-index: 1000;
    }
    nav div {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
    }
    nav div.active {
      color: #D4AF37;
      font-weight: bold;
    }
</style>
</head>

<body>

<h2>📊 Es-Shop Global Dashboard</h2>
<div id="debug" style="margin-bottom:10px;color:red;font-size:13px;"></div>
<div class="grid">

  <div class="card">
    <small>💰 Chiffre d'affaires</small>
    <div class="big" id="sales">0</div>
  </div>

  <div class="card">
    <small>📈 Profit net</small>
    <div class="big" id="profit">0</div>
  </div>

  <div class="card">
    <small>💸 Dépenses</small>
    <div class="big" id="expenses">0</div>
  </div>

  <div class="card">
    <small>📦 Produits vendus</small>
    <div class="big" id="sold">0</div>
  </div>

  <div class="card">
    <small>📊 Stock total (actuel)</small>
    <div class="big" id="stockTotal">0</div>
  </div>

  <div class="card">
    <small>📦 Nombre de produits</small>
    <div class="big" id="products">0</div>
  </div>

</div>

  <nav>
  <div class="nav-item" data-page="index.html">🛒 Vente rapide</div>
  <div class="nav-item" data-page="products.html">📦 Produits</div>
  <div class="nav-item" data-page="stats.html">📊 Stats</div>
  <div class="nav-item" data-page="settings.html">⚙️ Paramètres</div>
  <div class="nav-item active" data-page="purchases.html">📥 Achats</div>
  <div class="nav-item" data-page="losses.html">❌ Pertes</div>
  </nav>
  
<script>
document.querySelectorAll('nav .nav-item').forEach(item => {
  item.addEventListener('click', () => location.href = item.dataset.page);
});
</script>
  
<script type="module">
import { db } from "./js/firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const debug = (msg) => {
  document.getElementById("debug").innerText = msg;
};

const el = (id)=>document.getElementById(id);

const n = (v)=>{
  const num = Number(v);
  return isNaN(num) ? 0 : num;
};

function safe(obj, keys){
  for(const k of keys){
    if(obj && obj[k] != null) return obj[k];
  }
  return 0;
}

const auth = getAuth();

/* ========= START ========= */
debug("🔄 Initialisation...");

/* ========= AUTH ========= */
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    debug("❌ Non connecté → redirection");
    location.href="login.html";
    return;
  }

  debug("✅ Connecté → chargement data...");
  load();
});

/* ========= LOAD ========= */
async function load(){
  try{

    const [salesSnap, expSnap, stockSnap, prodSnap] = await Promise.all([
      getDocs(collection(db,"sales")),
      getDocs(collection(db,"expenses")),
      getDocs(collection(db,"stock_movements")),
      getDocs(collection(db,"products"))
    ]);

    const sales = salesSnap.docs.map(d=>d.data()||{});
    const expenses = expSnap.docs.map(d=>d.data()||{});
    const stock = stockSnap.docs.map(d=>d.data()||{});
    const products = prodSnap.docs.map(d=>d.data()||{});

    debug(
      `📊 sales:${sales.length} | expenses:${expenses.length} | stock:${stock.length} | products:${products.length}`
    );

    render(sales, expenses, stock, products);

  }catch(e){
    debug("🔥 ERREUR LOAD: " + e.message);
  }
}

/* ========= RENDER ========= */
function render(sales, expenses, stock, products){

  const totalSales = sales.reduce((a,s)=>
    a + n(safe(s,["total_amount","amount","amount_total"]))
  ,0);

  const totalProfit = sales.reduce((a,s)=>
    a + n(safe(s,["total_profit","profit"]))
  ,0);

  const totalExpenses = expenses.reduce((a,e)=>
    a + n(e.amount)
  ,0);

  const stockIn = stock
    .filter(s=>s.type==="IN")
    .reduce((a,s)=>a+n(s.quantity),0);

  const stockOut = stock
    .filter(s=>s.type==="OUT")
    .reduce((a,s)=>a+n(s.quantity),0);

  const stockTotal = stockIn - stockOut;

  el("sales").textContent = totalSales + " FC";
  el("profit").textContent = (totalProfit - totalExpenses) + " FC";
  el("expenses").textContent = totalExpenses + " FC";
  el("sold").textContent = sales.length;
  el("stockTotal").textContent = stockTotal;
  el("products").textContent = products.length;

  debug("✅ Render OK");
}
</script>
</body>
</html>
