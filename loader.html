<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Es-Shop Stats</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fa;
  margin:0;
  padding:20px;
}

h2{margin-bottom:15px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.big{
  font-size:22px;
  font-weight:bold;
}

small{color:#666}

.filters{
  margin-bottom:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input,button{
  padding:10px;
  border:1px solid #ddd;
  border-radius:6px;
}

button{
  background:#0B5FFF;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📊 Es-Shop Business Overview</h2>

<div class="filters">
  <input type="date" id="start">
  <input type="date" id="end">
  <button id="apply">Filtrer</button>
  <button id="export">Export CSV</button>
</div>

<div class="grid">
  <div class="card">
    <small>💰 Chiffre d'affaires</small>
    <div class="big" id="sales">0</div>
  </div>

  <div class="card">
    <small>📈 Profit net</small>
    <div class="big" id="profit">0</div>
  </div>

  <div class="card">
    <small>💸 Dépenses</small>
    <div class="big" id="expenses">0</div>
  </div>

  <div class="card">
    <small>📦 Produits vendus</small>
    <div class="big" id="sold">0</div>
  </div>

  <div class="card">
    <small>📉 Stock OUT</small>
    <div class="big" id="out">0</div>
  </div>

  <div class="card">
    <small>📥 Stock IN</small>
    <div class="big" id="in">0</div>
  </div>
</div>

<script type="module">
import { db } from "./js/firebase.js";
import {
  collection, getDocs, query, orderBy
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const auth = getAuth();

/* ================= STATE ================= */
let data = {
  sales: [],
  expenses: [],
  stock: []
};

/* ================= HELPERS ================= */
const el = (id) => document.getElementById(id);

const n = (v) => {
  const num = Number(v);
  return isNaN(num) ? 0 : num;
};

function safeGet(obj, keys, fallback = 0) {
  for (const k of keys) {
    if (obj?.[k] !== undefined && obj?.[k] !== null) return obj[k];
  }
  return fallback;
}

function toDate(t){
  if (!t) return null;
  if (typeof t?.toDate === "function") return t.toDate();
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}

/* ================= AUTH ================= */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="login.html";

  await load();
  applyDefault7Days();
});

/* ================= LOAD ================= */
async function load(){
  try {
    const [salesSnap, expSnap, stockSnap] = await Promise.all([
      getDocs(query(collection(db,"sales"), orderBy("createdAt","desc"))),
      getDocs(query(collection(db,"expenses"), orderBy("createdAt","desc"))),
      getDocs(query(collection(db,"stock_movements"), orderBy("createdAt","desc")))
    ]);

    data.sales = salesSnap.docs.map(d => d.data() || {});
    data.expenses = expSnap.docs.map(d => d.data() || {});
    data.stock = stockSnap.docs.map(d => d.data() || {});

    console.log("DATA LOADED:", {
      sales: data.sales.length,
      expenses: data.expenses.length,
      stock: data.stock.length
    });

    render();

  } catch (err) {
    console.error("LOAD ERROR:", err);
  }
}

/* ================= FILTER ================= */
function filterRange(list, start, end){
  if (!Array.isArray(list)) return [];

  const startDate = start ? new Date(start) : null;
  const endDate = end ? new Date(end) : null;

  return list.filter(item => {
    const d = toDate(item.createdAt);
    if (!d) return false;

    if (startDate && d < startDate) return false;
    if (endDate && d > endDate) return false;

    return true;
  });
}

/* ================= DEFAULT 7 DAYS ================= */
function applyDefault7Days(){
  const now = new Date();
  const start = new Date();
  start.setDate(now.getDate() - 7);

  el("start").valueAsDate = start;
  el("end").valueAsDate = now;

  render();
}

/* ================= RENDER ================= */
function render(){
  const start = el("start")?.value || null;
  const end = el("end")?.value || null;

  const sales = filterRange(data.sales, start, end);
  const expenses = filterRange(data.expenses, start, end);
  const stock = filterRange(data.stock, start, end);

  console.log("FILTERED:", {
    sales: sales.length,
    expenses: expenses.length,
    stock: stock.length
  });

  /* ================= CALCULS ================= */

  const totalSales = sales.reduce((a,s)=>
    a + n(safeGet(s, ["total_amount","amount_total","amount"]))
  ,0);

  const profit = sales.reduce((a,s)=>
    a + n(safeGet(s, ["total_profit","profit"]))
  ,0);

  const exp = expenses.reduce((a,e)=>
    a + n(e?.amount)
  ,0);

  const inStock = stock
    .filter(s => s?.type === "IN")
    .reduce((a,s)=> a + n(s?.quantity),0);

  const outStock = stock
    .filter(s => s?.type === "OUT")
    .reduce((a,s)=> a + n(s?.quantity),0);

  /* ================= UI ================= */

  setText("sales", totalSales + " FC");
  setText("profit", (profit - exp) + " FC");
  setText("expenses", exp + " FC");

  setText("sold", sales.length);
  setText("in", inStock);
  setText("out", outStock);
}

/* ================= UI SAFE ================= */
function setText(id, value){
  const node = el(id);
  if (node) node.textContent = value ?? "0";
}

/* ================= EVENTS ================= */
el("apply").onclick = render;

/* ================= EXPORT ================= */
el("export").onclick = () => {
  const csv = [
    "Metric,Value",
    `Sales,${el("sales")?.textContent || 0}`,
    `Profit,${el("profit")?.textContent || 0}`,
    `Expenses,${el("expenses")?.textContent || 0}`,
    `Sold,${el("sold")?.textContent || 0}`,
    `IN,${el("in")?.textContent || 0}`,
    `OUT,${el("out")?.textContent || 0}`
  ].join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "es-shop-stats.csv";
  a.click();

  URL.revokeObjectURL(url);
};
</script>

</body>
</html>
