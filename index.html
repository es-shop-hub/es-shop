<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ES Shop</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body { background: #F5F5F5; color: #111; }

    header {
      background: #0B3D2E;
      color: white;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header .status { font-size: 12px; color: #D4AF37; }

    .search-bar {
      padding: 10px;
      position: sticky;
      top: 0;
      background: #F5F5F5;
      z-index: 10;
    }

    .search-bar input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .product {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.2s;
    }

    .product:active { transform: scale(0.95); }

    .product h4 { font-size: 14px; }
    .product p { font-size: 12px; color: gray; }

    .cart {
      position: fixed;
      bottom: 70px;
      left: 0;
      width: 100%;
      background: white;
      padding: 10px;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
      max-height: 200px;
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .total { font-weight: bold; margin-top: 5px; }

    .sell-btn {
      width: 100%;
      padding: 12px;
      background: #0B3D2E;
      color: white;
      border: none;
      border-radius: 10px;
      margin-top: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .sell-btn:active { transform: scale(0.97); }

    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      color: white;
      z-index: 1000;
    }

    nav div {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    nav div:hover,
    nav div.active {
      color: #D4AF37;
      font-weight: bold;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(10px);
      transition: 0.4s;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .custom-date {
      display: flex;
      align-items: center;
      margin-top: 5px;
      gap: 5px;
      font-size: 12px;
    }

    .custom-date input[type="date"] {
      padding: 4px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 12px;
    }

  </style>
</head>

<body>

<header>
  <h3>ES Shop</h3>
  <div class="status">● Online</div>
</header>

<div class="search-bar">
  <input type="text" placeholder="Rechercher un produit..." id="searchInput">
</div>

<!-- PRODUITS (VIDE → JS REMPLIT) -->
<section class="products" id="productsContainer"></section>

<!-- PANIER -->
<div class="cart">

  <!-- ITEMS dynamiques -->
  
  <div class="custom-date">
    <input type="checkbox" id="manualDate">
    <label for="manualDate">Modifier date vente</label>
    <input type="date" id="saleDate" disabled>
  </div>

  <div class="total">Total: 0$</div>

  <button class="sell-btn">VENDRE</button>
</div>

<!-- NAV -->
<nav>
  <div class="nav-item active" data-page="index.html">🛒 Vente rapide</div>
  <div class="nav-item" data-page="products.html">📦 Produits</div>
  <div class="nav-item" data-page="stats.html">📊 Stats</div>
  <div class="nav-item" data-page="settings.html">⚙️ Paramètres</div>
  <div class="nav-item" data-page="purchases.html">📥 Achats</div>
  <div class="nav-item" data-page="losses.html">❌ Pertes</div>
</nav>

<script>
  // NAV
  document.querySelectorAll('nav .nav-item').forEach(item => {
    if (item.dataset.page === location.pathname.split('/').pop()) {
      item.classList.add('active');
    }
    item.addEventListener('click', () => location.href = item.dataset.page);
  });

  // DATE TOGGLE
  const manualDateCheckbox = document.getElementById('manualDate');
  const saleDateInput = document.getElementById('saleDate');

  manualDateCheckbox.addEventListener('change', () => {
    saleDateInput.disabled = !manualDateCheckbox.checked;
  });
</script>

<script type="module" src="js/index.js"></script>
<script src="js/nav.js"></script>

</body>
</html>
